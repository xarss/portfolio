<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio Fullstack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      background: #f6f7f3;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    ::selection {
      background: #c4d8f5;
    }
  </style>
</head>

<body>

  <div
    style="min-height:100vh; background:#f6f7f3; color:#2b2f29; font-family:'Hanken Grotesk', system-ui, sans-serif; padding:0 24px;">
    <div style="max-width:90%; margin:0 auto;">

      <!-- HERO -->
      <header style="padding:96px 0 60px 0;">
        <div
          style="display:flex; align-items:center; gap:10px; font-family:'IBM Plex Mono', monospace; font-size:12.5px; letter-spacing:0.16em; text-transform:uppercase; color:#2558b0;">
          <span style="width:7px; height:7px; border-radius:999px; background:#2558b0; display:inline-block;"></span>
          Portfólio · Desenvolvimento Web
        </div>

        <div style="margin-top:26px; display:flex; align-items:flex-start; justify-content:space-between; gap:24px;">
          <h1
            style="margin:0; font-size:clamp(44px, 8vw, 88px); line-height:1.02; font-weight:600; letter-spacing:-0.02em; color:#23271f; text-wrap:balance;">Portfolio Fullstack<br>Bibi Studio</h1>
          <div
            style="display:flex; flex-direction:column; align-items:flex-end; gap:16px; flex-shrink:0; max-width:45%;">
            <div
              style="display:inline-flex; align-items:center; gap:12px; padding:9px 16px 9px 14px; background:#ffffff; border:1px solid #e7e9e2; border-radius:999px;">
              <span
                style="display:inline-flex; align-items:center; gap:7px; font-family:'IBM Plex Mono', monospace; font-size:12px; letter-spacing:0.06em; color:#193d80;">
                <span
                  style="width:8px; height:8px; border-radius:999px; background:#2558b0; display:inline-block; box-shadow:0 0 0 4px #dae7f8;"></span>
                ATIVO
              </span>
              <span style="width:1px; height:16px; background:#e7e9e2;"></span>
              <span id="cnpj-badge"
                style="font-family:'IBM Plex Mono', monospace; font-size:13px; letter-spacing:0.02em; color:#6f756b;"></span>
            </div>
            <div id="keywords" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end;"></div>
          </div>
        </div>
      </header>

      <!-- LABEL -->
      <div
        style="display:flex; align-items:baseline; justify-content:space-between; padding:24px 0 4px 0; border-top:1px solid #e7e9e2;">
      </div>

      <!-- PROJECTS -->
      <main id="projects" style="display:flex; flex-direction:column; gap:40px; padding:40px 0 0 0;"></main>

      <!-- FOOTER -->
      <footer
        style="margin-top:64px; padding:32px 0 72px 0; border-top:1px solid #e7e9e2; display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:space-between;">
        <span id="footer-cnpj"
          style="font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:#9aa093; letter-spacing:0.04em;"></span>
        <span
          style="font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:#9aa093; letter-spacing:0.04em;">Portfolio
          Fullstack</span>
      </footer>

    </div>
  </div>

  <script src="data/projects.js"></script>
  <script>
    (function () {
      const data = PORTFOLIO_DATA;
      const pad = n => String(n).padStart(2, '0');
      const hostOf = url => url.replace(/^https?:\/\//, '').replace(/\/$/, '');

      document.getElementById('cnpj-badge').textContent = 'CNPJ ' + data.cnpj;
      document.getElementById('footer-cnpj').textContent = 'CNPJ ' + data.cnpj + ' · ATIVO';

      const kwEl = document.getElementById('keywords');
      data.keywords.forEach(kw => {
        const s = document.createElement('span');
        s.style.cssText = "font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.01em;color:#193d80;background:#e3ecf9;border:1px solid #c0d4f2;padding:8px 15px;border-radius:999px;";
        s.textContent = kw;
        kwEl.appendChild(s);
      });

      const main = document.getElementById('projects');
      data.projects.forEach((p, i) => {
        const num = pad(i + 1);
        const h = hostOf(p.url);

        const stackTags = p.stack.map(s =>
          `<span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#5b6157;background:#f6f7f3;border:1px solid #e3e6dd;padding:6px 12px;border-radius:999px;">${s}</span>`
        ).join('');

        const doneTags = p.done.map(d =>
          `<span style="font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.01em;color:#193d80;background:#dae7f8;padding:6px 12px;border-radius:999px;">${d}</span>`
        ).join('');

        const media = p.img
          ? `<img src="${p.img}" alt="Print da landing page" style="display:block;width:100%;height:auto;">`
          : `<div style="width:100%;aspect-ratio:16/9;background-color:#f1f2ee;background-image:repeating-linear-gradient(135deg,#eaece6 0 10px,#f1f2ee 10px 20px);display:flex;align-items:center;justify-content:center;">
               <div style="text-align:center;font-family:'IBM Plex Mono',monospace;color:#9aa093;">
                 <div style="font-size:13px;letter-spacing:0.06em;">[ print da landing page ]</div>
                 <div style="font-size:12px;margin-top:8px;color:#b3b8aa;">${h}</div>
               </div>
             </div>`;

        const article = document.createElement('article');
        article.style.cssText = 'background:#ffffff;border:1px solid #e7e9e2;border-radius:26px;padding:30px;box-shadow:0 1px 0 rgba(43,47,41,0.02),0 18px 40px -34px rgba(43,47,41,0.28);';
        article.innerHTML = `
          <div style="display:flex;flex-wrap:wrap;gap:24px 28px;align-items:flex-start;justify-content:space-between;margin-bottom:24px;">
            <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:flex-start;gap:12px;">
              <div style="display:flex;align-items:baseline;gap:14px;">
                <span style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a7ada0;letter-spacing:0.04em;">${num}</span>
                <h2 style="margin:0;font-size:27px;font-weight:600;letter-spacing:-0.01em;color:#23271f;white-space:nowrap;">${p.title}</h2>
              </div>
              <a href="${p.url}" target="_blank" rel="noopener"
                 style="display:inline-flex;align-items:center;gap:8px;margin-left:30px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#2558b0;text-decoration:none;border-bottom:1px solid #93b8e8;padding-bottom:2px;">
                <span style="opacity:0.6;">↗</span>${h}
              </a>
            </div>
            <div style="display:flex;flex-direction:column;gap:12px;align-items:flex-end;">
              <div style="display:flex;flex-wrap:wrap;gap:7px;">${stackTags}</div>
              <div style="display:flex;flex-wrap:wrap;gap:7px;">${doneTags}</div>
            </div>
          </div>
          ${p.description ? `<p style="margin:0 0 20px 0;font-size:15px;line-height:1.65;color:#5b6157;">${p.description}</p>` : ''}
          <div style="border:1px solid #e7e9e2;border-radius:18px;overflow:hidden;background:#f1f2ee;">
            <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #e7e9e2;background:#fbfbf9;">
              <span style="width:10px;height:10px;border-radius:999px;background:#e1e3db;display:inline-block;"></span>
              <span style="width:10px;height:10px;border-radius:999px;background:#e1e3db;display:inline-block;"></span>
              <span style="width:10px;height:10px;border-radius:999px;background:#e1e3db;display:inline-block;"></span>
              <span style="margin-left:12px;flex:1;max-width:420px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9aa093;background:#f3f4f0;border:1px solid #e7e9e2;padding:5px 12px;border-radius:999px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.url}</span>
            </div>
            ${media}
          </div>`;
        main.appendChild(article);
      });
    })();
  </script>
</body>

</html>
